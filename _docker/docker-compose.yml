services:
  app:
    container_name: ldc-shop
    build: .
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      # App URL (change to your domain in production)
      - APP_URL=http://localhost:3000
      - NEXT_PUBLIC_APP_URL=http://localhost:3000

      # Auth (AUTH_URL is auto-derived from APP_URL by entrypoint.sh)
      - AUTH_TRUST_HOST=true
      - AUTH_SECRET=replace_with_a_random_secret_string

      # Linux DO Connect OAuth (required)
      - OAUTH_CLIENT_ID=replace_with_client_id
      - OAUTH_CLIENT_SECRET=replace_with_client_secret

      # GitHub OAuth (optional)
      # - GITHUB_ID=replace_with_github_client_id
      # - GITHUB_SECRET=replace_with_github_client_secret

      # EPay payment (required for payment)
      - MERCHANT_ID=replace_with_merchant_id
      - MERCHANT_KEY=replace_with_merchant_key

      # Admin users (comma separated usernames)
      - ADMIN_USERS=admin

      # SQLite database path (inside container)
      - DATABASE_PATH=/app/data/ldc-shop.sqlite

      # Telegram / Bark / 邮件通知：登录后在管理后台配置，无需在此设置
